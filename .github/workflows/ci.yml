name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  smoke:
    name: CLI smokes (macOS + Ubuntu)
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install -r franklin/requirements.txt

      - name: Stub core tools (Zsh, Sheldon, Starship, bat, mise)
        run: |
          mkdir -p /tmp/fake-bin
          printf '#!/usr/bin/env bash\n echo \"Sheldon 0.0.0 (stub)\"' > /tmp/fake-bin/sheldon
          printf '#!/usr/bin/env bash\n echo \"starship 0.0.0 (stub)\"' > /tmp/fake-bin/starship
          printf '#!/usr/bin/env bash\n echo \"bat 0.0.0 (stub)\"' > /tmp/fake-bin/bat
          printf '#!/usr/bin/env bash\n echo \"zsh 0.0.0 (stub)\"' > /tmp/fake-bin/zsh
          printf '#!/usr/bin/env bash\n echo \"mise 0.0.0 (stub)\"' > /tmp/fake-bin/mise
          chmod +x /tmp/fake-bin/*
          echo "/tmp/fake-bin" >> "$GITHUB_PATH"

      # doctor verifies ~/.zshrc is the Franklin-managed symlink pointing at
      # <root>/franklin/templates/zshrc.zsh (added in v2.2.0), so link it the
      # way install.sh would.
      - name: Link ~/.zshrc to the Franklin template
        run: ln -sf "$PWD/franklin/templates/zshrc.zsh" ~/.zshrc

      - name: CLI smokes
        run: |
          source .venv/bin/activate
          export FRANKLIN_ROOT=$PWD
          export PYTHONPATH=franklin/src
          export PYTHONPYCACHEPREFIX=/tmp
          python -m lib.main --help >/dev/null
          python -m lib.main doctor --json
          python -m lib.main update --dry-run
          python -m lib.main update-all --dry-run
          python -m lib.main update-all --dry-run --system
